services:

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: rag-backend
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: rag-frontend
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - backend

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: rag-worker
    env_file:
      - .env
    depends_on:
      - backend