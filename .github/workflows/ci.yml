name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: docker build -f docker/backend.Dockerfile -t rag-backend .

      - name: Build Frontend Image
        run: docker build -f docker/frontend.Dockerfile -t rag-frontend .

      - name: Build Worker Image
        run: docker build -f docker/worker.Dockerfile -t rag-worker .